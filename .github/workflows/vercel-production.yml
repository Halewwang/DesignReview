name: Deploy to Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_CLI_VERSION: 54.14.2
      VERCEL_ORG_ID: team_qYa7bDiADxpQ1n1IlN3iEBJj
      VERCEL_PROJECT_ID: prj_u9kcosKWWhhMZUtqv9PiYOdCIlEU
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret: VERCEL_TOKEN"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pull Vercel production environment
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifact
        id: deploy
        run: |
          deployment_url="$(npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "Production deployment: ${deployment_url}"
